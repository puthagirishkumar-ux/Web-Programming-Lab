<!DOCTYPE html>
<html>
<head>
    <title>E-commerce Awareness</title>

    <!-- CSS Styling -->
    <style>
        /* Styling for div (block element) */
        div {
            background-color: lightyellow; /* Background color */
            padding: 15px; /* Space inside the box */
            width: 300px; /* Optional width */
        }

        /* Styling for span (inline element) */
        span {
            color: red; /* Highlight price in red */
            font-weight: bold; /* Make it bold */
        }

        /* Footer styling */
        footer {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- Product Information using div -->
    <div>
        Agricultural Equipment Price:
        <!-- Highlighted price using span -->
        <span>₹50,000</span>
    </div>

    <!-- Footer with Name and Register Number -->
    <footer>
        Name: P Girish Kumar | Reg No: 24BDS0007
    </footer>

</body>
</html>
