<!DOCTYPE html>
<html>
<head>
    <title>National Service</title>

    <!-- CSS using ID Selector -->
    <style>
        /* ID selector to style only one specific element */
        #mainHeading {
            color: red; /* Unique color for heading */
            text-align: center; /* Center the heading */
            font-size: 28px; /* Make it larger */
        }

        /* Footer styling */
        footer {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- Heading with ID -->
    <h2 id="mainHeading">
        National Service and Responsibility
    </h2>

    <!-- Normal Paragraph (no special styling) -->
    <p>
        Citizens contribute to nation-building through education, service,
        and discipline.
    </p>

    <!-- Footer with Name and Register Number -->
    <footer>
        Name: P Girish Kumar | Reg No: 24BDS0007
    </footer>

</body>
</html>
