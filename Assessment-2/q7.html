<!DOCTYPE html>
<html>
<head>
    <title>Blue Economy</title>

    <!-- CSS using element-prefixed class selectors -->
    <style>
        /* Styling only for h2 with class 'common' */
        h2.common {
            color: blue; /* Heading text in blue */
        }

        /* Styling only for p with class 'common' */
        p.common {
            background-color: lightblue; /* Paragraph background */
            padding: 10px; /* Space inside paragraph */
        }

        /* Footer styling */
        footer {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- Heading with same class -->
    <h2 class="common">
        Blue Economy and Maritime Growth
    </h2>

    <!-- Paragraph with same class -->
    <p class="common">
        The blue economy promotes sustainable use of ocean resources for
        economic growth and environmental protection.
    </p>

    <!-- Footer with Name and Register Number -->
    <footer>
        Name: P Girish Kumar | Reg No: 24BDS0007
    </footer>

</body>
</html>
