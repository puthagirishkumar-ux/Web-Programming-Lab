<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        /* Remove default margin and set full height */
        body {
            margin: 0;
            height: 100vh;

            /* Centering using flexbox */
            display: flex;
            justify-content: center; /* Horizontal center */
            align-items: center;     /* Vertical center */

            background-color: #f2f2f2; /* Light background */
            font-family: Arial;
        }

        /* Login box styling */
        .login-box {
            background-color: white;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        /* Heading style */
        h2 {
            margin-bottom: 20px;
        }

        /* Input fields styling */
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* Button styling */
        button {
            width: 100%;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Footer styling */
        footer {
            position: absolute;
            bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- Login Box -->
    <div class="login-box">
        <h2>Login</h2>

        <!-- Username Field -->
        <input type="text" placeholder="Username">

        <!-- Password Field -->
        <input type="password" placeholder="Password">

        <!-- Login Button -->
        <button>Login</button>
    </div>

    <!-- Footer -->
    <footer>
        Name: P Girish Kumar | Reg No: 24BDS0007
    </footer>

</body>
</html>
