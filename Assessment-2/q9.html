<!DOCTYPE html>
<html>
<head>
    <title>CSS Priority Demo</title>

    <!-- Internal CSS -->
    <style>
        /* This style will be overridden by inline CSS */
        p {
            color: blue; /* Internal CSS color */
            font-size: 18px;
        }

        /* Footer styling */
        footer {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- Paragraph with Inline CSS -->
    <p style="color: red;">
        Inline CSS takes precedence over internal CSS in case of conflicts.
    </p>

    <!-- Footer with Name and Register Number -->
    <footer>
        Name: P Girish Kumar | Reg No: 24BDS0007
    </footer>

</body>
</html>
